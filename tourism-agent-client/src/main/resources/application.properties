spring.application.name=Client
spring.profiles.active=dev
server.port=8080

# Gemini API Settings (Free Tier has strict rate limits)
llm.apiKey=${TRAVEL_AI_GEMINI_KEY:}

# Groq API Settings (Fallback)
groq.apiKey=${GROQ_API_KEY:}

# Google Maps API Settings
google.maps.apiKey=${GOOGLE_MAPS_API_KEY:}

# AI Failover Settings
# How long to wait before attempting to recover Gemini (ms)
ai.failover.recovery-timeout-ms=300000

# How often to check Gemini health in the background (ms)
ai.failover.check-interval-ms=60000